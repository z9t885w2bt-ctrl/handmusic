<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gesture Chord Wheel</title>

<style>
body {
  margin: 0;
  background: #0f1115;
  color: white;
  font-family: sans-serif;
}

.app {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.stage {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 20px;
  overflow: hidden;
}

video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
}

canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
}

button {
  padding: 10px 14px;
  font-size: 16px;
  background: hotpink;
  border: none;
  border-radius: 10px;
}
</style>
</head>

<body>
<div class="app">
  <button id="startBtn">啟動</button>
  <div class="stage">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>

<script type="module">
import {
  FilesetResolver,
  HandLandmarker
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const NOTES = ["C","C#","D","Eb","E","F","F#","G","Ab","A","Bb","B"];

const CHORDS = [
  {name:"maj", i:[0,4,7]},
  {name:"m", i:[0,3,7]},
  {name:"7", i:[0,4,7,10]},
  {name:"maj7", i:[0,4,7,11]},
  {name:"m7", i:[0,3,7,10]},
  {name:"sus2", i:[0,2,7]},
  {name:"sus4", i:[0,5,7]},
  {name:"add9", i:[0,4,7,14]}
];

let synth;
let handLandmarker;

const state = {
  root: 0,
  chord: 0,
  rootHold: false,
  chordHold: false,
  rootNote: null,
  chordNotes: []
};

function midi(n){
  return NOTES[n%12] + (Math.floor(n/12)-1);
}

function buildChord(root, chord){
  const base = 60 + root;
  return CHORDS[chord].i.map(i=>midi(base+i));
}

function startRoot(){
  const note = buildChord(state.root,0)[0];
  if(state.rootHold && state.rootNote===note) return;
  stopRoot();
  synth.triggerAttack(note);
  state.rootNote = note;
  state.rootHold = true;
}

function stopRoot(){
  if(!state.rootHold) return;
  synth.triggerRelease(state.rootNote);
  state.rootHold=false;
}

function startChord(){
  const notes = buildChord(state.root,state.chord);
  const key = notes.join("-");
  if(state.chordHold && key===state.key) return;
  stopChord();
  synth.triggerAttack(notes);
  state.chordNotes = notes;
  state.key = key;
  state.chordHold = true;
}

function stopChord(){
  if(!state.chordHold) return;
  synth.triggerRelease(state.chordNotes);
  state.chordHold=false;
}

function layout(){
  const r = Math.min(canvas.width,canvas.height)*0.32; // ⭐更大
  return {
    L:{x:canvas.width*0.28,y:canvas.height*0.7,r},
    R:{x:canvas.width*0.72,y:canvas.height*0.7,r}
  }
}

function toXY(lm){
  return {x:lm.x*canvas.width,y:lm.y*canvas.height}
}

function mirror(lms){
  return lms.map(p=>({...p,x:1-p.x}))
}

function hit(p,disk,total){
  const dx=p.x-disk.x;
  const dy=p.y-disk.y;
  const dist=Math.hypot(dx,dy);

  if(dist>disk.r) return null;
  if(dist<disk.r*0.35) return null; // ⭐中間更大空洞

  const a=(Math.atan2(dy,dx)+Math.PI/2+Math.PI*2)%(Math.PI*2);
  return Math.floor(a/(Math.PI*2/total));
}

function drawDisk(d,items,sel){
  const seg=Math.PI*2/items.length;

  for(let i=0;i<items.length;i++){
    const s=-Math.PI/2+i*seg;
    const e=s+seg;

    ctx.beginPath();
    ctx.moveTo(d.x,d.y);
    ctx.arc(d.x,d.y,d.r,s,e);
    ctx.closePath();

    ctx.fillStyle = i===sel
      ? "rgba(255,105,180,0.7)"
      : "rgba(255,182,193,0.25)";

    ctx.fill();

    const mid=s+seg/2;
    ctx.fillStyle="white";
    ctx.font="bold 20px sans-serif";
    ctx.textAlign="center";
    ctx.fillText(
      items[i],
      d.x+Math.cos(mid)*d.r*0.75,
      d.y+Math.sin(mid)*d.r*0.75
    );
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const d=layout();

  drawDisk(d.L,NOTES,state.root);
  drawDisk(d.R,CHORDS.map(c=>c.name),state.chord);
}

function process(results){
  const d=layout();

  let left=false,right=false;

  (results.landmarks||[]).forEach((lm,i)=>{
    const side=results.handedness[i][0].categoryName;
    const m=mirror(lm);
    const tip=toXY(m[8]);

    if(side==="Left"){
      const idx=hit(tip,d.L,NOTES.length);
      if(idx!==null){
        left=true;
        if(idx!==state.root){
          stopRoot();
          state.root=idx;
        }
        startRoot();
      }
    }

    if(side==="Right"){
      const idx=hit(tip,d.R,CHORDS.length);
      if(idx!==null){
        right=true;
        if(idx!==state.chord){
          stopChord();
          state.chord=idx;
        }
        startChord();
      }
    }
  });

  if(!left) stopRoot();
  if(!right) stopChord();

  draw();
}

canvas.addEventListener("pointerdown",e=>{
  const rect=canvas.getBoundingClientRect();
  const p={
    x:(e.clientX-rect.left)*canvas.width/rect.width,
    y:(e.clientY-rect.top)*canvas.height/rect.height
  };

  const d=layout();

  const l=hit(p,d.L,NOTES.length);
  if(l!==null){state.root=l;startRoot();return;}

  const r=hit(p,d.R,CHORDS.length);
  if(r!==null){state.chord=r;startChord();}
});

["pointerup","pointerleave"].forEach(ev=>{
  canvas.addEventListener(ev,()=>{
    stopRoot();
    stopChord();
  });
});

async function start(){
  await Tone.start();
  synth=new Tone.PolySynth().toDestination();

  const stream=await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject=stream;

  await new Promise(r=>video.onloadedmetadata=r);
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  const vision=await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
  );

  handLandmarker=await HandLandmarker.createFromOptions(vision,{
    baseOptions:{
      modelAssetPath:
      "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
    },
    runningMode:"VIDEO",
    numHands:2
  });

  loop();
}

function loop(){
  const r=handLandmarker.detectForVideo(video,performance.now());
  process(r);
  requestAnimationFrame(loop);
}

document.getElementById("startBtn").onclick=start;

</script>
</body>
</html>
