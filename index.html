<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gesture Chord Wheel</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at 20% 10%, rgba(210, 230, 255, 0.22), transparent 35%),
    radial-gradient(circle at 80% 20%, rgba(255, 245, 220, 0.18), transparent 32%),
    linear-gradient(135deg, #080a0f, #151820 55%, #0a0c10);
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.app {
  width: min(1500px, 100vw);
  margin: 0 auto;
  padding: 12px;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}

h1 {
  margin: 0;
  font-size: 20px;
  letter-spacing: 0.04em;
  font-weight: 800;
}

.controls {
  display: flex;
  gap: 8px;
  align-items: center;
}

button, select {
  font-size: 13px;
  padding: 7px 10px;
  border-radius: 999px;
  color: white;
  border: 1px solid rgba(255,255,255,0.22);
  background: rgba(255,255,255,0.10);
  backdrop-filter: blur(10px);
}

button {
  cursor: pointer;
  font-weight: 800;
  background: linear-gradient(135deg, rgba(255,255,255,.38), rgba(165,190,210,.22), rgba(255,235,190,.28));
}

.status {
  font-size: 12px;
  color: rgba(255,255,255,.72);
  margin-bottom: 8px;
  min-height: 18px;
}

.stage {
  position: relative;
  width: 100%;
  height: calc(100vh - 78px);
  min-height: 680px;
  border-radius: 24px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.16);
  background: #05070a;
  box-shadow: 0 24px 80px rgba(0,0,0,.5);
}

video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
  opacity: .82;
}

canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
  touch-action: none;
}

@media (max-width: 800px) {
  .topbar {
    align-items: flex-start;
    flex-direction: column;
  }

  .stage {
    height: calc(100vh - 116px);
    min-height: 620px;
  }

  h1 {
    font-size: 18px;
  }
}
</style>
</head>

<body>
<div class="app">
  <div class="topbar">
    <h1>Gesture Chord Wheel</h1>
    <div class="controls">
      <button id="startBtn">啟動</button>
      <select id="keySelect"></select>
      <select id="modeSelect">
        <option value="major">major</option>
        <option value="minor">minor</option>
      </select>
    </div>
  </div>

  <div class="status" id="status">尚未啟動。食指放在圓盤上會長音，離開會停止。</div>

  <div class="stage">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>

<script type="module">
import {
  FilesetResolver,
  HandLandmarker
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const startBtn = document.getElementById("startBtn");
const statusEl = document.getElementById("status");
const keySelect = document.getElementById("keySelect");
const modeSelect = document.getElementById("modeSelect");

const NOTES = ["C","C#","D","Eb","E","F","F#","G","Ab","A","Bb","B"];

const CHORDS = [
  {name:"maj", i:[0,4,7]},
  {name:"m", i:[0,3,7]},
  {name:"7", i:[0,4,7,10]},
  {name:"maj7", i:[0,4,7,11]},
  {name:"m7", i:[0,3,7,10]},
  {name:"sus2", i:[0,2,7]},
  {name:"sus4", i:[0,5,7]},
  {name:"add9", i:[0,4,7,14]}
];

const SCALE_PATTERNS = {
  major: [0,2,4,5,7,9,11],
  minor: [0,2,3,5,7,8,10]
};

NOTES.forEach((n, i) => {
  const opt = document.createElement("option");
  opt.value = i;
  opt.textContent = n;
  keySelect.appendChild(opt);
});

let synth;
let handLandmarker;

const state = {
  root: 0,
  chord: 0,
  rootHold: false,
  chordHold: false,
  rootNote: null,
  chordNotes: [],
  chordKey: null
};

function setStatus(text) {
  statusEl.textContent = text;
}

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = Math.round(rect.width * window.devicePixelRatio);
  canvas.height = Math.round(rect.height * window.devicePixelRatio);
  ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
}

function W() { return canvas.getBoundingClientRect().width; }
function H() { return canvas.getBoundingClientRect().height; }

function midi(n) {
  const sharpNotes = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  return sharpNotes[n % 12] + (Math.floor(n / 12) - 1);
}

function buildChord(root, chord) {
  const base = 60 + root;
  return CHORDS[chord].i.map(i => midi(base + i));
}

function startRoot() {
  if (!synth) return;
  const note = buildChord(state.root, 0)[0];

  if (state.rootHold && state.rootNote === note) return;

  stopRoot();
  synth.triggerAttack(note);
  state.rootNote = note;
  state.rootHold = true;
}

function stopRoot() {
  if (!synth || !state.rootHold || !state.rootNote) return;
  synth.triggerRelease(state.rootNote);
  state.rootHold = false;
  state.rootNote = null;
}

function startChord() {
  if (!synth) return;
  const notes = buildChord(state.root, state.chord);
  const key = notes.join("-");

  if (state.chordHold && state.chordKey === key) return;

  stopChord();
  synth.triggerAttack(notes);
  state.chordNotes = notes;
  state.chordKey = key;
  state.chordHold = true;
}

function stopChord() {
  if (!synth || !state.chordHold || !state.chordNotes.length) return;
  synth.triggerRelease(state.chordNotes);
  state.chordHold = false;
  state.chordNotes = [];
  state.chordKey = null;
}

function stopAll() {
  stopRoot();
  stopChord();
}

function getScaleSet() {
  const tonic = Number(keySelect.value);
  const mode = modeSelect.value;
  return new Set(SCALE_PATTERNS[mode].map(step => (tonic + step) % 12));
}

function layout() {
  const width = W();
  const height = H();

  const maxByWidth = width * 0.205;
  const maxByHeight = height * 0.33;
  const r = Math.min(maxByWidth, maxByHeight, 270);

  return {
    L: { x: width * 0.245, y: height * 0.61, r },
    R: { x: width * 0.755, y: height * 0.61, r }
  };
}

function toXY(lm) {
  return { x: lm.x * W(), y: lm.y * H() };
}

function mirror(lms) {
  return lms.map(p => ({ ...p, x: 1 - p.x }));
}

function hit(p, disk, total) {
  const dx = p.x - disk.x;
  const dy = p.y - disk.y;
  const distance = Math.hypot(dx, dy);

  if (distance > disk.r) return null;
  if (distance < disk.r * 0.34) return null;

  const angle = (Math.atan2(dy, dx) + Math.PI / 2 + Math.PI * 2) % (Math.PI * 2);
  return Math.floor(angle / (Math.PI * 2 / total));
}

function metallicGradient(cx, cy, r, selected) {
  const g = ctx.createRadialGradient(
    cx - r * 0.35, cy - r * 0.42, r * 0.04,
    cx, cy, r
  );

  if (selected) {
    g.addColorStop(0, "rgba(255,255,255,0.88)");
    g.addColorStop(0.22, "rgba(224,245,255,0.66)");
    g.addColorStop(0.45, "rgba(207,190,255,0.48)");
    g.addColorStop(0.68, "rgba(255,238,190,0.42)");
    g.addColorStop(1, "rgba(120,145,170,0.36)");
  } else {
    g.addColorStop(0, "rgba(255,255,255,0.46)");
    g.addColorStop(0.25, "rgba(220,245,255,0.26)");
    g.addColorStop(0.52, "rgba(210,205,255,0.18)");
    g.addColorStop(0.78, "rgba(255,244,210,0.16)");
    g.addColorStop(1, "rgba(120,145,170,0.12)");
  }

  return g;
}

function drawDisk(d, items, selected, options = {}) {
  const total = items.length;
  const seg = Math.PI * 2 / total;
  const scaleSet = options.scaleSet || null;

  ctx.save();

  ctx.beginPath();
  ctx.arc(d.x, d.y, d.r + 18, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255,255,255,0.035)";
  ctx.fill();

  for (let i = 0; i < total; i++) {
    const s = -Math.PI / 2 + i * seg;
    const e = s + seg;
    const mid = s + seg / 2;
    const isSelected = i === selected;
    const isScale = scaleSet && scaleSet.has(i);

    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.arc(d.x, d.y, d.r, s, e);
    ctx.closePath();

    ctx.fillStyle = metallicGradient(d.x + Math.cos(mid) * 30, d.y + Math.sin(mid) * 30, d.r, isSelected);
    ctx.globalAlpha = isSelected ? 1 : isScale ? 0.86 : 0.68;
    ctx.fill();

    ctx.globalAlpha = 1;
    ctx.strokeStyle = isSelected ? "rgba(255,255,255,0.7)" : "rgba(255,255,255,0.24)";
    ctx.lineWidth = isSelected ? 2.6 : 1.4;
    ctx.stroke();

    const shine = ctx.createLinearGradient(
      d.x + Math.cos(s) * d.r,
      d.y + Math.sin(s) * d.r,
      d.x + Math.cos(e) * d.r,
      d.y + Math.sin(e) * d.r
    );
    shine.addColorStop(0, "rgba(255,255,255,0.30)");
    shine.addColorStop(0.5, "rgba(255,255,255,0.02)");
    shine.addColorStop(1, "rgba(255,255,255,0.20)");

    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.arc(d.x, d.y, d.r, s, e);
    ctx.closePath();
    ctx.fillStyle = shine;
    ctx.globalAlpha = isSelected ? 0.7 : 0.36;
    ctx.fill();
    ctx.globalAlpha = 1;

    const tx = d.x + Math.cos(mid) * d.r * 0.74;
    const ty = d.y + Math.sin(mid) * d.r * 0.74;

    ctx.fillStyle = "rgba(255,255,255,0.95)";
    ctx.font = `800 ${Math.max(18, d.r * 0.085)}px system-ui`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = "rgba(0,0,0,0.55)";
    ctx.shadowBlur = 8;
    ctx.fillText(items[i], tx, ty);
    ctx.shadowBlur = 0;
  }

  ctx.beginPath();
  ctx.arc(d.x, d.y, d.r * 0.34, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(5,7,10,0.46)";
  ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,0.35)";
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = "rgba(255,255,255,0.92)";
  ctx.font = `900 ${Math.max(22, d.r * 0.11)}px system-ui`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(options.center || "", d.x, d.y);

  ctx.restore();
}

function drawHandDot(lm, label) {
  const p = toXY(lm[8]);

  const g = ctx.createRadialGradient(p.x - 4, p.y - 4, 2, p.x, p.y, 22);
  g.addColorStop(0, "rgba(255,255,255,.95)");
  g.addColorStop(0.45, "rgba(220,245,255,.7)");
  g.addColorStop(1, "rgba(255,230,185,.18)");

  ctx.beginPath();
  ctx.arc(p.x, p.y, 18, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,.72)";
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = "rgba(255,255,255,.9)";
  ctx.font = "800 14px system-ui";
  ctx.textAlign = "left";
  ctx.fillText(label, p.x + 22, p.y);
}

function draw(leftHand = null, rightHand = null) {
  ctx.clearRect(0, 0, W(), H());

  const d = layout();

  drawDisk(d.L, NOTES, state.root, {
    center: "ROOT",
    scaleSet: getScaleSet()
  });

  drawDisk(d.R, CHORDS.map(c => c.name), state.chord, {
    center: "CHORD"
  });

  ctx.fillStyle = "rgba(255,255,255,0.86)";
  ctx.font = "900 26px system-ui";
  ctx.textAlign = "center";
  ctx.fillText(`${NOTES[state.root]}${CHORDS[state.chord].name}`, W() / 2, H() * 0.12);

  ctx.font = "600 14px system-ui";
  ctx.fillStyle = "rgba(255,255,255,0.62)";
  ctx.fillText("食指放上圓盤＝長音｜離開＝停止｜也可以滑鼠長按", W() / 2, H() * 0.16);

  if (leftHand) drawHandDot(leftHand, "Left");
  if (rightHand) drawHandDot(rightHand, "Right");
}

function process(results) {
  const d = layout();
  let leftOn = false;
  let rightOn = false;
  let leftHand = null;
  let rightHand = null;

  (results.landmarks || []).forEach((lm, i) => {
    const side = results.handedness?.[i]?.[0]?.categoryName;
    const m = mirror(lm);
    const tip = toXY(m[8]);

    if (side === "Left") {
      leftHand = m;
      const idx = hit(tip, d.L, NOTES.length);
      if (idx !== null) {
        leftOn = true;
        if (idx !== state.root) {
          stopRoot();
          stopChord();
          state.root = idx;
        }
        startRoot();
      }
    }

    if (side === "Right") {
      rightHand = m;
      const idx = hit(tip, d.R, CHORDS.length);
      if (idx !== null) {
        rightOn = true;
        if (idx !== state.chord) {
          stopChord();
          state.chord = idx;
        }
        startChord();
      }
    }
  });

  if (!leftOn) stopRoot();
  if (!rightOn) stopChord();

  draw(leftHand, rightHand);
}

function pointerPoint(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

function handlePointerDown(e) {
  const p = pointerPoint(e);
  const d = layout();

  const l = hit(p, d.L, NOTES.length);
  if (l !== null) {
    stopAll();
    state.root = l;
    startRoot();
    draw();
    return;
  }

  const r = hit(p, d.R, CHORDS.length);
  if (r !== null) {
    state.chord = r;
    startChord();
    draw();
  }
}

canvas.addEventListener("pointerdown", handlePointerDown);
canvas.addEventListener("pointerup", stopAll);
canvas.addEventListener("pointerleave", stopAll);
canvas.addEventListener("pointercancel", stopAll);

keySelect.addEventListener("change", () => draw());
modeSelect.addEventListener("change", () => draw());

async function start() {
  startBtn.disabled = true;
  setStatus("正在啟動聲音與相機…");

  await Tone.start();

  synth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: "triangle" },
    envelope: {
      attack: 0.02,
      decay: 0.14,
      sustain: 0.72,
      release: 0.55
    }
  }).toDestination();

  synth.volume.value = -9;

  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: "user",
      width: { ideal: 1280 },
      height: { ideal: 720 }
    },
    audio: false
  });

  video.srcObject = stream;

  await new Promise(resolve => {
    video.onloadedmetadata = () => {
      video.play();
      resolve();
    };
  });

  resizeCanvas();
  window.addEventListener("resize", () => {
    resizeCanvas();
    draw();
  });

  setStatus("正在載入手勢模型…");

  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
  );

  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
    },
    runningMode: "VIDEO",
    numHands: 2,
    minHandDetectionConfidence: 0.6,
    minHandPresenceConfidence: 0.6,
    minTrackingConfidence: 0.6
  });

  setStatus("已啟動。左手控制 ROOT，右手控制 CHORD。");
  draw();
  loop();
}

function loop() {
  if (handLandmarker && video.readyState >= 2) {
    const result = handLandmarker.detectForVideo(video, performance.now());
    process(result);
  }
  requestAnimationFrame(loop);
}

startBtn.addEventListener("click", start);

resizeCanvas();
draw();
</script>
</body>
</html>
